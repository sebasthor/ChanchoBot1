<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChanchoBot</title>
  <style>
    :root {
      --bg: #0b141a;
      --panel: #111b21;
      --header: #202c33;
      --mine: #005c4b;
      --bot: #202c33;
      --text: #e9edef;
      --muted: #8696a0;
      --accent: #00a884;
      --border: #2a3942;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background:
        radial-gradient(circle at top, #1f2c34, #0b141a 45%),
        #0b141a;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .phone {
      width: min(100vw, 520px);
      height: min(100vh, 860px);
      background: var(--panel);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
    }

    header {
      height: 72px;
      background: var(--header);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6d4c2f, #d7b46a);
      display: grid;
      place-items: center;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .info h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }

    .status {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      background:
        linear-gradient(rgba(11, 20, 26, 0.90), rgba(11, 20, 26, 0.90)),
        repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0 1px, transparent 1px 16px);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .intro {
      align-self: center;
      max-width: 92%;
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.35;
    }

    .msg {
      max-width: 82%;
      padding: 8px 10px 6px;
      border-radius: 8px;
      line-height: 1.36;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,.25);
      animation: pop .18s ease-out;
    }

    @keyframes pop {
      from { transform: translateY(4px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .user {
      align-self: flex-end;
      background: var(--mine);
      border-top-right-radius: 0;
    }

    .bot {
      align-self: flex-start;
      background: var(--bot);
      border-top-left-radius: 0;
    }

    .time {
      color: rgba(255,255,255,.55);
      font-size: 11px;
      float: right;
      margin-left: 8px;
      transform: translateY(4px);
    }

    .typing {
      align-self: flex-start;
      background: var(--bot);
      padding: 11px 14px;
      border-radius: 8px;
      border-top-left-radius: 0;
      display: none;
      width: 72px;
      box-shadow: 0 1px 2px rgba(0,0,0,.25);
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dots span:nth-child(2) { animation-delay: .15s; }
    .dots span:nth-child(3) { animation-delay: .3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .45; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    form {
      background: var(--header);
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      resize: none;
      border: 0;
      outline: none;
      border-radius: 22px;
      padding: 12px 15px;
      background: #2a3942;
      color: var(--text);
      font: inherit;
      font-size: 15px;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 0;
      background: var(--accent);
      color: #001f18;
      font-weight: 900;
      cursor: pointer;
      font-size: 18px;
      flex: 0 0 auto;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    @media (max-width: 640px) {
      body {
        align-items: stretch;
      }

      .phone {
        width: 100vw;
        height: 100vh;
        border: 0;
      }

      .msg {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <main class="phone">
    <header>
      <div class="avatar">📻</div>
      <div class="info">
        <h1>ChanchoBot</h1>
        <div id="status" class="status">en línea</div>
      </div>
    </header>

    <section id="messages">
      <div class="intro">
        MVP público. No reemplaza a nadie: es una recreación afectiva de su estilo, con ironía y memoria.
      </div>

      <div class="msg bot">
        Bueno, chancho. Escribí algo, pero que no sea una tragedia griega tampoco.
        <span class="time"></span>
      </div>

      <div id="typing" class="typing">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
    </section>

    <form id="form">
      <textarea id="input" placeholder="Mensaje" rows="1"></textarea>
      <button id="send" type="submit">➤</button>
    </form>
  </main>

  <script>
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const typing = document.getElementById("typing");
    const status = document.getElementById("status");
    const sendButton = document.getElementById("send");

    const userId = localStorage.getItem("chancho_user_id") || crypto.randomUUID();
    localStorage.setItem("chancho_user_id", userId);

    function nowTime() {
      return new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[m]));
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + (role === "user" ? "user" : "bot");
      div.innerHTML = `${escapeHtml(text)}<span class="time">${nowTime()}</span>`;
      messages.insertBefore(div, typing);
      messages.scrollTop = messages.scrollHeight;
    }

    function setTyping(isTyping) {
      typing.style.display = isTyping ? "block" : "none";
      status.textContent = isTyping ? "escribiendo..." : "en línea";
      messages.scrollTop = messages.scrollHeight;
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";
      input.style.height = "44px";

      sendButton.disabled = true;
      setTyping(true);

      let reply = "Se cortó algo, chancho. Probá de nuevo.";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, userId })
        });

        const data = await res.json();
        reply = data.reply || data.error || reply;
      } catch (err) {
        reply = "No pude responder. Hasta internet se hace el vivo.";
      }

      // Delay realista: mínimo 5 segundos + un poco más si la respuesta es larga.
      const extraDelay = Math.min(3000, reply.length * 18);
      await wait(5000 + extraDelay);

      setTyping(false);
      addMessage("bot", reply);

      sendButton.disabled = false;
      input.focus();
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage();
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener("input", () => {
      input.style.height = "44px";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });
  </script>
</body>
</html>
